<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeatherNow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #0a0a1a;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
      position: relative;
      transition: background 0.8s ease;
    }

    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: drift 12s ease-in-out infinite alternate; pointer-events: none; z-index: 0; }
    .orb1 { width: 500px; height: 500px; background: #1a6cf7; top: -150px; left: -150px; animation-duration: 14s; }
    .orb2 { width: 400px; height: 400px; background: #7c3aed; top: 30%; right: -100px; animation-duration: 10s; animation-delay: -4s; }
    .orb3 { width: 350px; height: 350px; background: #0ea5e9; bottom: -100px; left: 30%; animation-duration: 16s; animation-delay: -8s; }
    @keyframes drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px,30px) scale(1.08); } }

    .content { position: relative; z-index: 1; width: 100%; max-width: 520px; }

    header { text-align: center; margin-bottom: 36px; }
    .logo { font-family: 'Space Grotesk', sans-serif; font-size: 2.6rem; font-weight: 700; color: #fff; letter-spacing: -1px; line-height: 1; }
    .logo span { background: linear-gradient(135deg, #58a6ff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-sub { margin-top: 8px; color: rgba(255,255,255,0.4); font-size: 0.88rem; }

    .unit-toggle { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 14px; }
    .unit-label { color: rgba(255,255,255,0.5); font-size: 0.85rem; font-weight: 500; transition: color 0.2s; }
    .unit-label.active { color: #58a6ff; }
    .toggle-track { width: 48px; height: 26px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 13px; cursor: pointer; position: relative; transition: background 0.3s; }
    .toggle-track.on { background: rgba(88,166,255,0.3); border-color: rgba(88,166,255,0.5); }
    .toggle-thumb { width: 18px; height: 18px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 4px; transition: left 0.25s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .toggle-track.on .toggle-thumb { left: 26px; }

    /* Search */
    .search-wrap { background: rgba(255,255,255,0.07); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 6px 6px 6px 20px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; transition: border-color 0.2s; }
    .search-wrap:focus-within { border-color: rgba(88,166,255,0.5); }
    .search-wrap input { flex: 1; background: none; border: none; outline: none; color: #fff; font-size: 1rem; font-family: 'Inter', sans-serif; padding: 8px 0; }
    .search-wrap input::placeholder { color: rgba(255,255,255,0.3); }
    .search-wrap button { background: linear-gradient(135deg, #2563eb, #7c3aed); border: none; color: #fff; font-size: 0.9rem; font-weight: 600; padding: 12px 24px; border-radius: 12px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; font-family: 'Inter', sans-serif; }
    .search-wrap button:hover { opacity: 0.88; }
    .search-wrap button:active { transform: scale(0.97); }

    /* Geolocation button */
    .geo-btn {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.65);
      font-size: 0.88rem; font-weight: 500;
      padding: 11px 20px; border-radius: 14px;
      cursor: pointer; margin-bottom: 16px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .geo-btn:hover { background: rgba(88,166,255,0.1); border-color: rgba(88,166,255,0.35); color: #58a6ff; }
    .geo-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .geo-btn .geo-icon { font-size: 1rem; }
    .geo-pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: #43e97b;
      animation: geoblink 1.5s ease-in-out infinite;
      display: none;
    }
    @keyframes geoblink { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.7); } }

    /* Recent */
    .recent-section { margin-bottom: 20px; display: none; }
    .recent-title { color: rgba(255,255,255,0.35); font-size: 0.73rem; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
    .recent-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; cursor: pointer; transition: background 0.2s, border-color 0.2s; display: flex; align-items: center; gap: 7px; }
    .chip:hover { background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.4); color: #58a6ff; }
    .chip-x { opacity: 0.4; font-size: 0.75rem; }
    .chip-x:hover { opacity: 1; color: #f87171; }

    .error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.35); color: #fca5a5; padding: 14px 18px; border-radius: 12px; font-size: 0.88rem; margin-bottom: 20px; display: none; }
    .loader { display: none; width: 38px; height: 38px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 30px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Card */
    .weather-card { display: none; background: rgba(255,255,255,0.07); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.12); border-radius: 24px; overflow: hidden; animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

    .card-hero { padding: 32px 32px 28px; background: linear-gradient(135deg, rgba(37,99,235,0.25), rgba(124,58,237,0.2)); border-bottom: 1px solid rgba(255,255,255,0.08); transition: background 0.8s ease; }
    .city-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .city-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: #fff; }
    .city-country { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 4px; }
    .local-time { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); font-size: 0.78rem; padding: 6px 12px; border-radius: 20px; white-space: nowrap; margin-top: 4px; }

    /* Location badge */
    .location-badge { display: none; align-items: center; gap: 6px; background: rgba(67,233,123,0.12); border: 1px solid rgba(67,233,123,0.25); color: #43e97b; font-size: 0.75rem; font-weight: 600; padding: 5px 12px; border-radius: 20px; margin-top: 8px; width: fit-content; }

    .temp-row { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
    .temp-main { font-family: 'Space Grotesk', sans-serif; font-size: 5.5rem; font-weight: 700; color: #fff; line-height: 1; letter-spacing: -2px; }
    .temp-main sup { font-size: 2rem; vertical-align: super; }
    .weather-icon-big { font-size: 5rem; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3)); }

    .weather-desc { margin-top: 10px; color: rgba(255,255,255,0.6); font-size: 1rem; text-transform: capitalize; }
    .feels-row { margin-top: 6px; display: flex; align-items: center; gap: 16px; }
    .feels-badge { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12); padding: 5px 14px; border-radius: 20px; font-size: 0.82rem; color: rgba(255,255,255,0.7); }
    .feels-badge b { color: #7dd3fc; }
    .high-low { font-size: 0.82rem; color: rgba(255,255,255,0.5); }
    .high-low b { color: rgba(255,255,255,0.8); }

    .card-stats { padding: 24px 24px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 18px 20px; transition: background 0.2s; }
    .stat-box:hover { background: rgba(255,255,255,0.09); }
    .stat-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .stat-emoji { font-size: 1.1rem; }
    .stat-label { color: rgba(255,255,255,0.4); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.6px; }
    .stat-value { font-size: 1.5rem; font-weight: 600; color: #fff; }
    .stat-unit { font-size: 0.8rem; color: rgba(255,255,255,0.45); margin-left: 3px; font-weight: 400; }

    .card-extra { padding: 0 24px 28px; }
    .extra-row { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px 20px; display: flex; justify-content: space-around; gap: 10px; }
    .extra-item { text-align: center; }
    .extra-label { color: rgba(255,255,255,0.4); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .extra-val { font-size: 1.05rem; font-weight: 600; color: #fff; }
    .extra-icon { font-size: 1.3rem; margin-bottom: 4px; }
    .divider-v { width: 1px; background: rgba(255,255,255,0.08); }

    footer { margin-top: 36px; color: rgba(255,255,255,0.2); font-size: 0.78rem; text-align: center; position: relative; z-index: 1; }
  </style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="content">
  <header>
    <div class="logo">Weather<span>Now</span></div>
    <div class="logo-sub">Real-time weather for any city in the world</div>
    <div class="unit-toggle">
      <span class="unit-label active" id="labelC">°C</span>
      <div class="toggle-track" id="unitToggle" onclick="toggleUnit()">
        <div class="toggle-thumb"></div>
      </div>
      <span class="unit-label" id="labelF">°F</span>
    </div>
  </header>

  <div class="search-wrap">
    <span style="font-size:1.1rem;opacity:0.4">🔍</span>
    <input type="text" id="cityInput" placeholder="Search any city..." />
    <button onclick="getWeather()">Search</button>
  </div>

  <!-- Geolocation Button -->
  <button class="geo-btn" id="geoBtn" onclick="getLocationWeather()">
    <span class="geo-icon">📍</span>
    <span id="geoBtnText">Use My Location</span>
    <div class="geo-pulse" id="geoPulse"></div>
  </button>

  <div class="recent-section" id="recentSection">
    <div class="recent-title">Recent Searches</div>
    <div class="recent-chips" id="recentChips"></div>
  </div>

  <div class="error" id="errorBox"></div>
  <div class="loader" id="loader"></div>

  <div class="weather-card" id="weatherCard">
    <div class="card-hero" id="cardHero">
      <div class="city-row">
        <div>
          <div class="city-name" id="cityName"></div>
          <div class="city-country" id="countryName"></div>
          <!-- Location badge — only shows when geolocation used -->
          <div class="location-badge" id="locationBadge">
            📍 Your Location
          </div>
        </div>
        <div class="local-time" id="localTime"></div>
      </div>
      <div class="temp-row">
        <div class="temp-main" id="tempValue"></div>
        <div class="weather-icon-big" id="weatherIcon"></div>
      </div>
      <div class="weather-desc" id="description"></div>
      <div class="feels-row">
        <div class="feels-badge">Feels like <b id="feelsLike"></b></div>
        <div class="high-low" id="highLow"></div>
      </div>
    </div>
    <div class="card-stats">
      <div class="stat-box">
        <div class="stat-top"><span class="stat-emoji">💧</span><span class="stat-label">Humidity</span></div>
        <div><span class="stat-value" id="humidity"></span><span class="stat-unit">%</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-top"><span class="stat-emoji">💨</span><span class="stat-label">Wind</span></div>
        <div><span class="stat-value" id="windSpeed"></span><span class="stat-unit">m/s</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-top"><span class="stat-emoji">👁️</span><span class="stat-label">Visibility</span></div>
        <div><span class="stat-value" id="visibility"></span><span class="stat-unit">km</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-top"><span class="stat-emoji">🌡️</span><span class="stat-label">Pressure</span></div>
        <div><span class="stat-value" id="pressure"></span><span class="stat-unit">hPa</span></div>
      </div>
    </div>
    <div class="card-extra">
      <div class="extra-row">
        <div class="extra-item">
          <div class="extra-icon">🌅</div>
          <div class="extra-label">Sunrise</div>
          <div class="extra-val" id="sunrise"></div>
        </div>
        <div class="divider-v"></div>
        <div class="extra-item">
          <div class="extra-icon">🌇</div>
          <div class="extra-label">Sunset</div>
          <div class="extra-val" id="sunset"></div>
        </div>
        <div class="divider-v"></div>
        <div class="extra-item">
          <div class="extra-icon">☁️</div>
          <div class="extra-label">Cloud Cover</div>
          <div class="extra-val" id="clouds"></div>
        </div>
        <div class="divider-v"></div>
        <div class="extra-item">
          <div class="extra-icon">🌬️</div>
          <div class="extra-label">Wind Dir</div>
          <div class="extra-val" id="windDir"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>Built with ❤️ using OpenWeatherMap API · WeatherNow</footer>

<script>
  const API_KEY = "2d6f8f2fde47f2032a564c9fd2ed892f";

  let isFahrenheit = false;
  let lastData = null;
  let isGeoSearch = false;

  const iconMap = {
    "01d":"☀️","01n":"🌙","02d":"⛅","02n":"⛅","03d":"☁️","03n":"☁️",
    "04d":"☁️","04n":"☁️","09d":"🌧️","09n":"🌧️","10d":"🌦️","10n":"🌦️",
    "11d":"⛈️","11n":"⛈️","13d":"❄️","13n":"❄️","50d":"🌫️","50n":"🌫️"
  };

  // Dynamic background based on weather
  const weatherBg = {
    Clear:       { orb1: '#f59e0b', orb2: '#f97316' },
    Clouds:      { orb1: '#64748b', orb2: '#475569' },
    Rain:        { orb1: '#1d4ed8', orb2: '#0369a1' },
    Drizzle:     { orb1: '#2563eb', orb2: '#0284c7' },
    Thunderstorm:{ orb1: '#4c1d95', orb2: '#1e1b4b' },
    Snow:        { orb1: '#bfdbfe', orb2: '#e0f2fe' },
    Mist:        { orb1: '#94a3b8', orb2: '#64748b' },
    Haze:        { orb1: '#ca8a04', orb2: '#a16207' },
  };

  function updateBackground(condition) {
    const colors = weatherBg[condition] || { orb1: '#1a6cf7', orb2: '#7c3aed' };
    document.querySelector('.orb1').style.background = colors.orb1;
    document.querySelector('.orb2').style.background = colors.orb2;
  }

  const toF = c => (c * 9/5 + 32).toFixed(1);
  const degToCompass = d => ['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8];
  const fmtTime = (unix, offset) => new Date((unix + offset) * 1000).toUTCString().slice(17, 22);

  // Recent searches
  function getRecent() { try { return JSON.parse(localStorage.getItem('wn_recent') || '[]'); } catch { return []; } }
  function saveRecent(city) {
    let arr = getRecent().filter(c => c.toLowerCase() !== city.toLowerCase());
    arr.unshift(city); arr = arr.slice(0, 6);
    localStorage.setItem('wn_recent', JSON.stringify(arr));
    renderRecent();
  }
  function removeRecent(city) {
    localStorage.setItem('wn_recent', JSON.stringify(getRecent().filter(c => c !== city)));
    renderRecent();
  }
  function renderRecent() {
    const arr = getRecent();
    const section = document.getElementById('recentSection');
    if (!arr.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    document.getElementById('recentChips').innerHTML = arr.map(c =>
      `<div class="chip" onclick="searchCity('${c}')">🕐 ${c}<span class="chip-x" onclick="event.stopPropagation();removeRecent('${c}')">✕</span></div>`
    ).join('');
  }
  function searchCity(city) { document.getElementById('cityInput').value = city; isGeoSearch = false; getWeather(); }

  // Unit toggle
  function toggleUnit() {
    isFahrenheit = !isFahrenheit;
    const track = document.getElementById('unitToggle');
    track.classList.toggle('on', isFahrenheit);
    document.getElementById('labelC').classList.toggle('active', !isFahrenheit);
    document.getElementById('labelF').classList.toggle('active', isFahrenheit);
    if (lastData) renderCard(lastData);
  }

  function displayTemp(c) { return isFahrenheit ? `${toF(c)}<sup>°F</sup>` : `${Math.round(c)}<sup>°C</sup>`; }
  function displayTempPlain(c) { return isFahrenheit ? toF(c) + '°F' : Math.round(c) + '°C'; }

  // ── GEOLOCATION ──
  function getLocationWeather() {
    if (!navigator.geolocation) {
      showError("Geolocation is not supported by your browser.");
      return;
    }

    // Update button state
    const btn = document.getElementById('geoBtn');
    const btnText = document.getElementById('geoBtnText');
    const pulse = document.getElementById('geoPulse');
    btn.disabled = true;
    btnText.textContent = 'Detecting location...';
    pulse.style.display = 'block';

    navigator.geolocation.getCurrentPosition(
      async (position) => {
        const { latitude, longitude } = position.coords;
        isGeoSearch = true;
        showLoader(true); hideError(); hideCard();

        try {
          const res = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&appid=${API_KEY}&units=metric`
          );
          const d = await res.json();
          if (d.cod !== 200) { showError(d.message || "Location weather not found."); return; }
          lastData = d;
          saveRecent(d.name);
          renderCard(d);
        } catch(e) {
          showError("Could not fetch weather for your location.");
        } finally {
          showLoader(false);
          btn.disabled = false;
          btnText.textContent = 'Use My Location';
          pulse.style.display = 'none';
        }
      },
      (error) => {
        btn.disabled = false;
        btnText.textContent = 'Use My Location';
        pulse.style.display = 'none';
        const msgs = {
          1: "Location access denied. Please allow location in browser settings.",
          2: "Location unavailable. Try searching manually.",
          3: "Location request timed out. Try again."
        };
        showError(msgs[error.code] || "Could not get your location.");
      },
      { timeout: 10000, maximumAge: 300000 }
    );
  }

  // ── SEARCH ──
  document.getElementById("cityInput").addEventListener("keydown", e => { if (e.key === "Enter") { isGeoSearch = false; getWeather(); } });

  async function getWeather() {
    const city = document.getElementById("cityInput").value.trim();
    if (!city) return;
    isGeoSearch = false;
    showLoader(true); hideError(); hideCard();
    try {
      const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`);
      const d = await res.json();
      if (d.cod !== 200) { showError(d.message || "City not found."); return; }
      lastData = d;
      saveRecent(d.name);
      renderCard(d);
    } catch(e) {
      showError("Something went wrong. Check API key or connection.");
    } finally { showLoader(false); }
  }

  function renderCard(d) {
    // Dynamic background
    updateBackground(d.weather[0].main);

    // Show/hide location badge
    const badge = document.getElementById('locationBadge');
    badge.style.display = isGeoSearch ? 'flex' : 'none';

    document.getElementById("cityName").textContent = d.name;
    document.getElementById("countryName").textContent = `${d.sys.country} · ${d.weather[0].main}`;
    document.getElementById("localTime").textContent = fmtTime(Math.floor(Date.now()/1000), d.timezone) + " local";
    document.getElementById("tempValue").innerHTML = displayTemp(d.main.temp);
    document.getElementById("weatherIcon").textContent = iconMap[d.weather[0].icon] || "🌡️";
    document.getElementById("description").textContent = d.weather[0].description;
    document.getElementById("feelsLike").textContent = displayTempPlain(d.main.feels_like);
    document.getElementById("highLow").innerHTML = `<b>↑${displayTempPlain(d.main.temp_max)}</b> &nbsp;<b>↓${displayTempPlain(d.main.temp_min)}</b>`;
    document.getElementById("humidity").textContent = d.main.humidity;
    document.getElementById("windSpeed").textContent = d.wind.speed.toFixed(1);
    document.getElementById("visibility").textContent = (d.visibility / 1000).toFixed(1);
    document.getElementById("pressure").textContent = d.main.pressure;
    document.getElementById("sunrise").textContent = fmtTime(d.sys.sunrise, d.timezone);
    document.getElementById("sunset").textContent = fmtTime(d.sys.sunset, d.timezone);
    document.getElementById("clouds").textContent = d.clouds.all + "%";
    document.getElementById("windDir").textContent = degToCompass(d.wind.deg);
    document.getElementById("weatherCard").style.display = "block";
  }

  function showLoader(v) { document.getElementById("loader").style.display = v ? "block" : "none"; }
  function hideError() { document.getElementById("errorBox").style.display = "none"; }
  function hideCard() { document.getElementById("weatherCard").style.display = "none"; }
  function showError(msg) { const el = document.getElementById("errorBox"); el.textContent = "⚠️ " + msg; el.style.display = "block"; }

  renderRecent();
</script>
</body>
</html>
